<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Nothing Personal ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: monospace;
  text-align: center;
  color: white;
}

/* MATRIX */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  display: none;
}

/* SECTIONS */
.section {
  position: absolute;
  width: 100%;
  top: 40%;
  text-align: center;
}
.hidden { display: none; }

/* POPUP */
#boxContent {
  display: inline-block;
  border: 2px solid #00ff00;
  padding: 25px;
  color: #00ff00;
  box-shadow: 0 0 20px #00ff00;
  background: rgba(0,0,0,0.7);
}

/* BUTTONS */
button {
  background: transparent;
  border: 2px solid #00ff00;
  color: #00ff00;
  padding: 10px 20px;
  margin: 10px;
  cursor: pointer;
}

#noBtn {
  position: absolute;
}

/* FINAL THEME */
#final {
  top: 15%;
}

/* PHOTO */
#photo {
  width: 260px;
  border-radius: 20px;
  border: 4px solid gold;
  box-shadow: 0 0 25px gold, 0 0 40px blue;
}

/* BALLOONS */
.balloon {
  position: absolute;
  bottom: -100px;
  width: 20px;
  height: 30px;
  border-radius: 250%;
  animation: floatUp 5s linear forwards;
}
@keyframes floatUp {
  to { transform: translateY(-120vh); }
}

/* RIBBONS */
.ribbon {
  position: absolute;
  width: 6px;
  height: 20px;
  background: blue;
  animation: fall 5s linear forwards;
}
@keyframes fall {
  to { transform: translateY(100vh); }
}

/* FIREWORK */
.firework {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 70%;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>
<audio id="music" src="music.mp3"></audio>

<div id="start" class="section">
  <h2><a href="#" onclick="start()"> Tap Here 😊</a></h2>
</div>

<div id="loading" class="section hidden">
  <p id="code" style="color:#00ff00;"></p>
</div>

<div id="box" class="section hidden">
  <div id="boxContent">
    <h2> WARNING! Authorization request: Do you Accept?</h2>
    <button onclick="yes()">YES</button>
    <button id="noBtn" onmouseover="moveNo()">NO</button>
  </div>
</div>

<div id="final" class="section hidden">
  <h2 style="color:gold;">✨ IF BEAUTY IS A PERSON THEN THATS YOU ❤️ ✨</h2>
  <img id="photo" src="photo1.jpg"><br><br>
  <p id="message"></p>
</div>

<script>
/* GET ELEMENTS */
const startDiv = document.getElementById("start");
const loadingDiv = document.getElementById("loading");
const boxDiv = document.getElementById("box");
const finalDiv = document.getElementById("final");
const code = document.getElementById("code");
const noBtn = document.getElementById("noBtn");
const photo = document.getElementById("photo");
const message = document.getElementById("message");

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let drops = Array(Math.floor(canvas.width/14)).fill(1);
let running = false;

function drawMatrix(){
  if(!running) return;

  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#0F0";
  ctx.font="14px monospace";

  drops.forEach((y,i)=>{
    ctx.fillText(Math.random()>0.5?"1":"0", i*14, y*14);
    if(y*14>canvas.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  });

  requestAnimationFrame(drawMatrix);
}

/* START */
function start(){
  startDiv.classList.add("hidden");
  loadingDiv.classList.remove("hidden");

  canvas.style.display="block";
  running=true;
  drawMatrix();

  let txt="Initializing...\nDecrypting...\nAccessing heart...\n";
  let i=0;

  function type(){
    if(i<txt.length){
      code.innerHTML+=txt[i++];
      setTimeout(type,40);
    } else {
      setTimeout(()=>{
        loadingDiv.classList.add("hidden");
        boxDiv.classList.remove("hidden");
      },1000);
    }
  }
  type();
}

/* MOVE NO */
function moveNo(){
  noBtn.style.top=Math.random()*window.innerHeight+"px";
  noBtn.style.left=Math.random()*window.innerWidth+"px";
}

/* YES */
function yes(){
  running=false;
  canvas.style.display="none";

  boxDiv.classList.add("hidden");
  finalDiv.classList.remove("hidden");

  document.body.style.background="linear-gradient(black,#001f3f)";

  playMusic();
  launchParty();
  launchFireworks();
  typeMessage();
  slideshow();
}

/* MUSIC */
function playMusic(){
  let m=document.getElementById("music");
  m.volume=0;
  m.play();
  let fade=setInterval(()=>{
    if(m.volume<1) m.volume+=0.05;
    else clearInterval(fade);
  },200);
}

/* MESSAGE */
let text="Lewaaaa, tsk meh hard lo tkt, yu yet u boss eh ❤️";
let ti=0;
function typeMessage(){
  if(ti<text.length){
    message.innerHTML+=text[ti++];
    setTimeout(typeMessage,80);
  }
}

/* SLIDESHOW */
let imgs=["photo1.JPG","photo2.jpg","photo3.JPG"];
let idx=0;
function slideshow(){
  setInterval(()=>{
    idx=(idx+1)%imgs.length;
    photo.src=imgs[idx];
  },3000);
}

/* PARTY */
function launchParty(){
  for(let i=0;i<20;i++){
    let b=document.createElement("div");
    b.className="balloon";
    b.style.left=Math.random()*100+"vw";
    b.style.background="hsl("+Math.random()*360+",100%,50%)";
    document.body.appendChild(b);
  }

  for(let i=0;i<30;i++){
    let r=document.createElement("div");
    r.className="ribbon";
    r.style.left=Math.random()*100+"vw";
    document.body.appendChild(r);
  }
}

/* FIREWORKS */
function launchFireworks(){
  setInterval(()=>{
    explode(Math.random()*innerWidth, Math.random()*innerHeight/2);
  },600);
}

function explode(x,y){
  for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="firework";
    p.style.background="hsl("+Math.random()*360+",100%,50%)";
    document.body.appendChild(p);

    let a=Math.random()*2*Math.PI;
    let d=Math.random()*80;

    let start=null;
    function anim(t){
      if(!start) start=t;
      let pr=t-start;

      p.style.transform=`translate(${x+Math.cos(a)*d}px,${y+Math.sin(a)*d}px)`;
      p.style.opacity=1-pr/600;

      if(pr<600) requestAnimationFrame(anim);
      else p.remove();
    }
    requestAnimationFrame(anim);
  }
}
</script>

</body>
</html>
